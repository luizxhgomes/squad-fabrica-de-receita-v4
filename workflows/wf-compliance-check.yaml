id: wf-compliance-check
name: Compliance Check (Selo Experience Designer automatizado)
version: 1.0.0
created: 2026-05-15
owner: experience-designer
squad: fabrica-de-receita
severity: NON_NEGOTIABLE
status: active

description: |
  Workflow automatizado que valida toda peça HTML contra as 9 regras
  NON_NEGOTIABLE do design system antes de emitir o selo de aprovação do brand-chief
  Experience Designer. Substitui validação manual por gate determinístico via script CLI.

  Aciona o validador `scripts/compliance-check.sh` (path relativo à raiz do squad)
  e decide o curso de ação baseado no resultado:
  - PASS total: emite selo, peça pode ser publicada
  - WARN não-blocking: emite selo com ressalvas, peça pode ser publicada após revisão
  - FAIL blocking: bloqueia publicação, gera story de correção via @sm

trigger:
  - command: "/compliance-check <path>"
  - command: "@experience-designer *check <path>"
  - event: "Após @dev terminar HTML e antes de @qa receber"
  - event: "Pre-deploy de qualquer peça "

inputs:
  required:
    - path: "Caminho absoluto ou relativo para arquivo HTML ou pasta com HTMLs"
  optional:
    - mode: "strict | normal (default)"
    - context: "client | system | proposal (apenas para metadata do log)"

regras_validadas:
  - id: R1
    name: "Nunca inventar logo"
    severity: NON_NEGOTIABLE
    fonte: "DESIGN.md §10"
  - id: R2
    name: "Paleta do brandbook na paleta"
    severity: NON_NEGOTIABLE
    fonte: "DESIGN.md §0 (autoridade experience-designer)"
  - id: R3
    name: "Zero travessão na copy"
    severity: NON_NEGOTIABLE
    fonte: "manual Cientista de Marketing (data/revenue-principles.md)"
  - id: R4
    name: "Favicon obrigatório"
    severity: NON_NEGOTIABLE
    fonte: "DESIGN.md §1.2.2"
  - id: R5
    name: "Localização (path em V4_Company/)"
    severity: NON_NEGOTIABLE
    fonte: "CLAUDE.md raiz"
  - id: R6
    name: "Zero <br/> em headlines (regra 8.1)"
    severity: NON_NEGOTIABLE
    fonte: "RESPONSIVE-PROPORTIONALITY.md §8.1 v3.2"
  - id: R7
    name: "Números como dígitos (regra 7.1)"
    severity: NON_NEGOTIABLE
    fonte: "DESIGN.md §7.1 v1.2.0"
  - id: R8
    name: "overflow-x: clip global (regra 8.3)"
    severity: NON_NEGOTIABLE
    fonte: "RESPONSIVE-PROPORTIONALITY.md §8.3 v3.2"
  - id: R9
    name: "max-width em ch ausente em containers (regra 8.9)"
    severity: NON_NEGOTIABLE
    fonte: "RESPONSIVE-PROPORTIONALITY.md §8.9 v3.2"

steps:
  - id: step-1
    name: "Validar inputs e localizar peça"
    agent: experience-designer
    action: |
      1. Confirmar que o argumento `path` foi fornecido
      2. Verificar que o arquivo/pasta existe
      3. Se for pasta, listar quantos HTMLs serão validados
    on_fail: "Reportar erro de input e abortar workflow"

  - id: step-2
    name: "Executar validador CLI"
    agent: experience-designer
    action: |
      Acionar o script de validação (a partir da raiz do squad):

      ```bash
      bash scripts/compliance-check.sh <path>
      ```

      Capturar:
      - Exit code (0 = PASS, 1 = FAIL, 2 = erro de uso)
      - stdout completo (resultado de cada uma das 9 regras)
      - Lista de FAILURES (se houver)
      - Lista de WARNINGS (se houver)
    outputs:
      - exit_code
      - pass_count
      - warn_count
      - fail_count
      - failures: "array de mensagens de falha"
      - warnings: "array de avisos"

  - id: step-3
    name: "Decidir veredito"
    agent: experience-designer
    decision_matrix:
      - condition: "exit_code == 0 AND warn_count == 0"
        verdict: APPROVED
        action: "Emitir selo Experience Designer completo"
      - condition: "exit_code == 0 AND warn_count > 0"
        verdict: APPROVED_WITH_NOTES
        action: "Emitir selo Experience Designer com observações. Documentar warnings."
      - condition: "exit_code == 1"
        verdict: REJECTED
        action: "Bloquear publicação. Encaminhar para @sm gerar story de correção."
      - condition: "exit_code == 2"
        verdict: ERROR
        action: "Reportar erro de uso e solicitar correção do input."

  - id: step-4a
    name: "Caso APPROVED · emitir selo"
    when: "verdict == APPROVED or verdict == APPROVED_WITH_NOTES"
    agent: experience-designer
    action: |
      1. Gravar artefato de selo em:
         `<path-parent>/qa/experience-designer-selo-{timestamp}.md`
      2. Conteúdo do selo:
         - Path da peça
         - Data e hora
         - Versão do RESPONSIVE-PROPORTIONALITY.md vigente
         - Resultado por regra (PASS/WARN)
         - Assinatura do brand-chief
      3. Notificar agente solicitante (@dev, @sm, @aiox-master)
    outputs:
      - selo_artifact_path

  - id: step-4b
    name: "Caso REJECTED · gerar story de correção"
    when: "verdict == REJECTED"
    agent: experience-designer
    handoff_to: "@sm"
    action: |
      1. Compilar artefato de falha em:
         `<path-parent>/qa/experience-designer-rejection-{timestamp}.md`
      2. Conteúdo:
         - Path da peça reprovada
         - Lista de FAILURES com referência à regra (R1-R9) e doc canônico
         - Sugestão concreta de correção por regra
      3. Acionar @sm para criar story de correção com:
         - Título: "Refatorar <peça> para conformidade (compliance check FAIL)"
         - Acceptance criteria: "Rodar compliance-check.sh e obter exit_code 0"
         - Prioridade: HIGH (peça bloqueada para publicação)
         - Owner sugerido: @dev (ou agente que produziu a peça)
    outputs:
      - rejection_artifact_path
      - story_id

  - id: step-5
    name: "Persistir auditoria"
    agent: experience-designer
    action: |
      Anexar entrada ao log de compliance do squad em:
      `qa/compliance-log.jsonl` (path relativo à raiz do squad)

      Schema da entrada:
      ```json
      {
        "timestamp": "ISO-8601",
        "path": "<path da peça>",
        "verdict": "APPROVED|APPROVED_WITH_NOTES|REJECTED|ERROR",
        "pass": <int>,
        "warn": <int>,
        "fail": <int>,
        "failures": ["..."],
        "warnings": ["..."],
        "agent_invoker": "<agent que pediu validação>",
        "context": "client|system|proposal"
      }
      ```

      Esse log alimenta dashboards de qualidade do squad e permite trend tracking
      de quais regras são mais violadas ao longo do tempo.

output:
  - selo_emitido: "boolean"
  - artifact_path: "caminho do selo ou rejeição"
  - verdict: "APPROVED | APPROVED_WITH_NOTES | REJECTED | ERROR"
  - story_id: "<id> ou null"
  - report_summary: "Sumário human-readable do resultado"

dependencies:
  scripts:
    - "scripts/compliance-check.sh (v1.0.1+, path relativo à raiz do squad; script a ser criado)"
  docs:
    - "design/DESIGN.md (v1.2.0+)"
    - "design/RESPONSIVE-PROPORTIONALITY.md (v3.2+)"
  agents:
    - experience-designer (executor)
    - "@sm (handoff em caso de REJECTED)"

quality_gates:
  - id: QG-001
    name: "Input válido"
    type: input_validation
    blocking: false
    check: "path informado existe (arquivo ou pasta)"
  - id: QG-002
    name: "Validador executável"
    type: tooling
    blocking: true
    check: "compliance-check.sh existe e é executável"
  - id: QG-003
    name: "Zero violações blocking"
    type: execution
    blocking: true
    check: "exit_code do validador == 0"
  - id: QG-004
    name: "Artefato de auditoria gravado"
    type: output_completeness
    blocking: true
    check: "compliance-log.jsonl entry criada"

cross_squad_handoffs:
  - to: "@sm"
    when: "verdict == REJECTED"
    payload: "Path da peça + lista de FAILURES + sugestão de correção"
  - from: "@dev"
    trigger: "Ao terminar HTML antes de pedir review"
    payload: "Path do arquivo produzido"
  - from: "@aiox-master"
    trigger: "Pre-deploy de qualquer peça "
    payload: "Path do arquivo a publicar"

uso_exemplo: |
  # Via CLI direto (a partir da raiz do squad)
  bash scripts/compliance-check.sh path/to/peca.html

  # Via slash command (quando configurado em.claude/commands/)
  /compliance-check path/to/peca.html

  # Via agente
  @experience-designer *check path/to/peca.html

  # Em lote (pasta inteira recursiva)
  bash scripts/compliance-check.sh <pasta-com-pecas>/

  # Modo strict (warnings viram falhas)
  bash scripts/compliance-check.sh --strict path/to/peca.html
