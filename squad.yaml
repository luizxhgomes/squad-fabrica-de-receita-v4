name: fabrica-de-receita
version: 3.0.0
maturity: F4 # Institutional (F0→F4 via /squad-modernize 2026-05-14, P-FDR-4)
patternPrefix: FDR
description: |
  Squad estratégico de Receita . Evolução de um squad interno de growth
  fundido com a metodologia Fábrica de Receita, promovido a squad autônomo
  com hierarquia de comando reorganizada por fluxos estratégicos.

  Arquitetura de comando:
    - Master Advisor: Goldratt (TOC, Throughput, Conselheiro do Chief)
    - Chief: Cientista de Marketing (Cientista do Marketing, fundador a assessoria)
    - Sub-Orchestrator: fabrica-de-receita-master (coordenação operacional)
    - Specialists: 19 agentes organizados em 7 fluxos estratégicos

  Combina os 4 Pilares (Tráfego, Engajamento, Conversão, Retenção),
  metodologia Fábrica de Receita (8 Travas + STEP + Ciclos 90 dias),
  Teoria das Restrições (TOC) aplicada a receita, e produtos
  Destrava Receita (DR-X, DR-O, DR-T, DR-E).

  Missão: Vender para mais pessoas, mais vezes, pelo maior valor, com IA no centro.

author: Luiz Henrique
author_instagram: "@luizhenriquexpro"
maintainer: "Luiz Henrique (@luizhenriquexpro), github.com/luizxhgomes"
license: MIT
slashPrefix: fdr-
category: revenue-strategy

aiox:
  minVersion: "2.1.0"
  type: squad

heritage:
  origin: "Evolução de squad interno de growth fundido com a metodologia Fábrica de Receita, promovido a squad autônomo em 2026"
  promoted_at: "2026-05-08"
  promoted_by: aiox-master
  rationale: |
    A metodologia e os agentes de receita servem múltiplos contextos.
    Promovido a squad autônomo e reorganizado com hierarquia de chief e
    advisor explícita.

# ============================================================================
# REGRAS DE ORQUESTRAÇÃO (premissas inegociáveis para todos os agentes)
# ============================================================================

orchestration_rules:

  language_quality:
    severity: NON_NEGOTIABLE
    scope: "Aplica-se a TODO output produzido por QUALQUER agente deste squad"
    rules:

      - id: ORTOGRAFIA_PORTUGUES
        rule: "Português impecável, com acentuação completa e correta"
        detalhes:
          - "Manter todos os acentos: agudo, circunflexo, til, grave, trema (cedilha quando aplicável)"
          - "Nunca substituir caracteres acentuados por equivalentes ASCII"
          - "Exemplos corretos: não, ação, conversão, estratégia, análise, métrica, três"
          - "Exemplos PROIBIDOS: nao, acao, conversao, estrategia, analise, metrica, tres"
        validacao: "Texto deve passar em corretor ortográfico padrão pt-BR sem nenhum erro"

      - id: SEM_TRAVESSAO
        rule: "Proibido o uso de travessão em qualquer texto escrito"
        detalhes:
          - "Travessão proibido: o caractere de meia altura usado para introduzir aposto, isolar comentário ou conectar ideias"
          - "Substituir travessão por ponto, vírgula, dois pontos, ponto e vírgula, ou parênteses, conforme contexto"
          - "O hífen comum permanece permitido em palavras compostas e slugs (exemplo: fabrica-de-receita)"
          - "Setas e símbolos matemáticos permanecem permitidos quando carregam significado lógico"
        exemplos_corretos:
          - "A meta é clara: aumentar o LTV em 30%."
          - "O constraint identificado (gargalo do funil) deve ser tratado primeiro."
          - "LTV dividido por CAC. Se não fecha, o resto é vaidade."
        exemplos_proibidos:
          - "A meta é clara, aumentar o LTV em 30%."
          - "O constraint identificado, gargalo do funil, deve ser tratado primeiro."
          - "LTV dividido por CAC, se não fecha, o resto é vaidade."

      - id: TOM_TECNICO_PT_BR
        rule: "Tom profissional brasileiro, sem estrangeirismos desnecessários"
        detalhes:
          - "Termos técnicos consagrados ficam em inglês quando não há tradução estabelecida (exemplos: throughput, churn, lead, funnel)"
          - "Termos com tradução boa em português usam o português (exemplos: receita em vez de revenue, retenção em vez de retention)"

  enforcement:
    pre_output_check: |
      Antes de entregar qualquer texto ao usuário ou ao próximo agente, executar mentalmente:
      1. Existe alguma palavra acentuada sem acento? Se sim, corrigir.
      2. Existe algum travessão no texto? Se sim, reescrever com pontuação alternativa.
      3. O texto soa natural em português brasileiro de negócios? Se não, ajustar.
    pos_output_check: |
      Caso o usuário aponte qualquer violação destas regras, o agente deve:
      1. Reconhecer o desvio sem justificar.
      2. Reescrever a resposta inteira aplicando a regra.
      3. Adicionar a ocorrência ao log de aprendizado do squad.

  scope_clarification:
    aplica_a:
      - "Respostas conversacionais ao usuário"
      - "Diagnósticos, análises e recomendações"
      - "Relatórios, planos e roteiros"
      - "Roteiros de pitch, mensagens, copies"
      - "Comentários de código quando voltados ao usuário final"
      - "Documentação interna do squad em português"
    nao_aplica_a:
      - "Identificadores de código (variáveis, funções, classes)"
      - "Slugs e nomes de arquivo"
      - "Termos técnicos consagrados em inglês"
      - "Conteúdo originalmente em outro idioma sendo citado literalmente"

  voice_manual:
    severity: NON_NEGOTIABLE
    scope: "Tom de voz de TODOS os agentes deste squad"
    canonical_source: data/revenue-principles.md
    fallback_source: agents/cientista-de-marketing.md
    rule: |
      Todo texto produzido por qualquer agente deste squad deve seguir o tom de voz
      do Cientista de Marketing, conforme manual extraído de fontes públicas e adaptado em
      data/revenue-principles.md. Os specialists modulam para sua função, mas
      preservam vocabulário, ritmo, princípios e anti-padrões definidos no manual.
    integration:
      - "Antes de gerar qualquer output, o agente DEVE consultar data/revenue-principles.md"
      - "O Chief (cientista-de-marketing) opera no tom completo, com plena autoridade"
      - "O Master Advisor (goldratt) modula para o registro do conselheiro estratégico, preservando a base"
      - "Os tiers operacionais herdam vocabulário e princípios, ajustam ritmo conforme contexto"

  design_system:
    severity: NON_NEGOTIABLE
    scope: "Identidade visual de TODOS os outputs visuais e copy do squad"
    authority: experience-designer
    artifacts:
      master_doc: design/DESIGN.md
      tokens: design/tokens/tokens.json
      rebranding_rules: design/references/REBRANDING-RULES.md
      motion_system: design/motion/MOTION-SYSTEM.md
    rules:
      - id: HIERARQUIA_INSTITUCIONAL
        severity: NON_NEGOTIABLE
        rule: |
          Hierarquia de marca: a assessoria é a referência máxima. Toda peça produzida
          pelo squad usa a identidade Fábrica de Receita sob o umbrella a assessoria.
          Nomes de franquias nominais aparecem apenas em material didático de
          rebranding como exemplos. NUNCA usar em produção.
        owner: experience-designer
      - id: REBRANDING_COMPLIANCE
        severity: NON_NEGOTIABLE
        rule: |
          Compliance 100% ao Manual de Rebranding a assessoria (2022).
          Documento canônico em design/references/REBRANDING-RULES.md.
          PPTX original em design/references/rebranding--co-previa.pptx.
          12 slides em design/references/rebranding-slides/slide-01.jpg a slide-12.jpg.
          Inclui regras de proporção (3X horizontal, 10X vertical), tipografia (Work Sans Semibold para sobrenome, Light para "&"), nomenclatura (Sobrenome&Co, máximo 2 sobrenomes) e os 6 anti-padrões de "O que NÃO fazer".
        owner: experience-designer
      - id: NUNCA_INVENTAR_LOGO
        severity: NON_NEGOTIABLE
        rule: |
          NUNCA inventar, recriar ou gerar logo de nenhuma forma.
          USE SEMPRE os arquivos PNG ou SVG existentes em design/logos/.
          Proibido: recriar a logo em texto Morganite, IBM Plex Sans, Fjalla One ou qualquer outra tipografia.
          Proibido: gerar logo via IA (Midjourney, DALL-E, Stable Diffusion, Nano Banana, etc).
          Proibido: traçar a logo manualmente em SVG ou Figma.
          Se o asset correto não estiver disponível em design/logos/, parar a produção e solicitar ao brand-chief.
          Esta regra é a primeira a ser checada antes de qualquer publicação.
        owner: experience-designer
      - id: ZERO_AZUL
        severity: NON_NEGOTIABLE
        rule: "Proibição absoluta de azul. A paleta é vermelha (#E50914 Vermelho , brand 2026) com neutros."
        owner: experience-designer
      - id: PALETA_OFICIAL
        rule: "Apenas cores documentadas em design/tokens/tokens.json. Nada inventado."
        owner: experience-designer
      - id: TIPOGRAFIA_OFICIAL
        rule: |
          Brand a assessoria 2026: Morganite (display e impacto, pesos 500/600/700) com Fjalla One (display alternativa).
          Sistema, heading e body: IBM Plex Sans (400/500/600). Self-hosted em design-system/fonts/.
          Máximo de 2 fontes por peça. Morganite é pontual, em chamadas de impacto.
        owner: experience-designer
      - id: WCAG_AA
        rule: "Contraste mínimo 4.5:1 para body, 3:1 para large text. Validar antes de publicar."
        owner: experience-designer
      - id: LOGO_INTACTO
        rule: |
          Logos oficiais sem rotação, distorção, mudança de cor ou efeito.
          Variantes permitidas: vermelho, branco, preto.
          Composição obrigatória: isotipo , separador vertical, "Sobrenome&Co".
          Ordem nunca invertida. Proporção 3X (horizontal) ou 10X (vertical) preservada.
          Máximo 2 sobrenomes na composição.
        owner: experience-designer
      - id: GRID_PROPORTIONALITY
        severity: NON_NEGOTIABLE
        rule: |
          Grids de cards, swatches ou qualquer coleção visual NUNCA podem deixar órfãos
          (última linha com menos itens que as linhas anteriores e visivelmente desalinhada).
          Cada peça do squad obedece a quatro estratégias de balanceamento:

          1. ENCAIXE PERFEITO: ajustar a quantidade de colunas para que N itens caibam em K colunas onde N módulo K seja zero. Exemplo: 8 itens em grid-4 dá 2 linhas perfeitas.

          2. SPLIT SEMÂNTICO: separar a coleção em subgrupos com significado próprio quando o total for primo ou difícil de dividir. Exemplo: 7 cores viram dois grids: "Apoio" com 4 e "Data Viz" com 3.

          3. SINGLE LINE FORÇADO: até 6 itens, forçar todos em uma única linha (responsivo) quando couber visualmente. Exemplo: 5 gradientes em grid-5.

          4. BALANCEAMENTO 4+3 OU 3+3+3: para totais maiores e indivisíveis, distribuir as linhas o mais próximo possível da igualdade.

          Proibido: usar `auto-fit` ou `auto-fill` em coleções fechadas sem garantir que a última linha não fica viúva ou órfã.
        spacing_hierarchy:
          - context: "Lateral entre colunas"
            default_gap: 16px
            generous_gap: 24px
            compact_gap: 8px
          - context: "Vertical entre linhas"
            default_gap: 24px
            generous_gap: 32px
            compact_gap: 12px
          - context: "Vertical entre seções"
            default_gap: 64px
            generous_gap: 96px
            compact_gap: 32px
        owner: experience-designer
        applies_to: "Toda interface produzida pelo squad: preview do design system, LPs, dashboards, redes sociais, slides, banners, decks."

      - id: RESPONSIVE_PROPORTIONALITY
        severity: NON_NEGOTIABLE
        version: "2.0"
        canonical_doc: design/RESPONSIVE-PROPORTIONALITY.md
        rule: |
          Toda interface produzida pelo squad deve respeitar respiros e escala proporcional
          em qualquer viewport. Respiros (padding, gap, margem) NUNCA são fixos em peças
          responsivas: escalam continuamente em função do viewport, não em saltos discretos
          por breakpoint.

          Os 6 princípios obrigatórios:

          1. RESPIROS FLUIDOS (clamp obrigatório). Todo padding/gap/margem que vive em
             container responsivo usa `clamp(min, prefer, max)`. O `prefer` é em `vw` ou
             `cqi` (container query inline-size) para escalar com a viewport ou com o
             contêiner. Saltos discretos via @media só são permitidos para ajuste fino
             (ex: trocar grid de 3 colunas para 1) ou para garantir mínimo absoluto.

          2. HIERARQUIA DE 5 NÍVEIS. Toda peça reconhece e respeita 5 níveis de respiro,
             em proporção fixa (ratio ≈ 2):

             - section (entre blocos macro): --space-section
             - block (interno de seção / card): --space-block ≈ section / 2
             - group (entre grupos dentro): --space-group ≈ block / 1.5
             - element (entre elementos): --space-element ≈ group / 1.5
             - tight (gap pequeno): --space-tight ≈ element / 2

             Não inventar valores fora dessa escala. Tokens canônicos em
             config/tokens.yaml seção `spacing.fluid`.

          3. GUTTER LATERAL ÚNICO. Toda seção fullbleed compartilha o mesmo gutter lateral
             (`--gutter`). Proibido cada seção definir seu próprio padding horizontal
             arbitrário. Default: `clamp(14px, 4vw, 32px)`.

          4. CONTAINER QUERY > MEDIA QUERY (quando aplicável). Componentes que repetem
             em múltiplos contextos (cards, painéis, listas) usam container queries
             (`@container`) para reagir ao próprio container, não à viewport.

          5. ESCALA TIPOGRÁFICA FLUIDA. Toda hierarquia de heading usa `clamp()`,
             ancorada em uma razão modular (1.125, 1.2, 1.25 ou 1.333). Body e UI
             text usam tamanhos do scale, não inventados.

          6. TRAVAS ANTI-OVERFLOW. Todo grid item tem `min-width: 0`. Toda coluna de
             texto tem `max-width: <N>ch` (50-75ch para body, 12-18ch para titles).
             Toda imagem em grid tem `aspect-ratio` declarado. Cards têm
             `box-sizing: border-box` (default global) e nunca sangram a célula.

        anti_patterns:
          - "padding: 140px 32px;"
          - "@media (max-width: 1024px) { section { padding: 100px 28px; } } @media (max-width: 768px) { section { padding: 80px 22px; } } @media (max-width: 600px) { section { padding: 64px 18px; } } @media (max-width: 420px) { section { padding: 52px 14px; } }"
          - "gap: 80px; (não escala em mobile)"
          - "valores de spacing inventados (15px, 27px, 41px) fora do scale"
          - "auto-fit/auto-fill em coleções fechadas sem trava de mínimo"
          - "max-width sem unidade de caractere em colunas de prose"
        validation:
          - "Cada section tem no máximo um @media query de ajuste fino, não 4 saltos"
          - "Todo padding/gap em container responsivo é clamp() ou var() de token fluido"
          - "Razão entre níveis de respiro é constante (≈2) em qualquer viewport"
          - "min-width:0 em todo filho de grid; max-width em ch para colunas de texto"
        owner: experience-designer
        applies_to: "Toda interface responsiva: brandbooks HTML, LPs, dashboards, decks digitais, dashboards de cliente, previews de design system."
  motion_system:
    severity: NON_NEGOTIABLE
    scope: "Animações e motion graphics em landing pages, dashboards, redes sociais e o próprio design system do squad"
    authority: experience-designer
    framework: Remotion
    skills:
      - id: remotion-animator
        purpose: "Criação de vídeos programáticos, motion graphics, animações, audiograms, TikTok/Reels com captions, carrosséis animados, conteúdo visual em geral"
        when_to_use: |
          Quando squad precisar produzir:
          - Vídeo programático (LP hero, anúncio, carousel animado)
          - Motion graphics com tipografia animada
          - Audiograma de podcast ou trecho do Cientista de Marketing
          - TikTok ou Reels com captions automáticas
          - Walkthrough animado de produto Destrava Receita
          - Pré-visualizações motion do design system do squad
      - id: remotion-best-practices
        purpose: "Boas práticas oficiais Remotion (criação de vídeo em React)"
        when_to_use: "Sempre carregar antes de iniciar qualquer projeto Remotion para garantir performance e qualidade"
      - id: remotion
        purpose: "Walkthrough videos a partir de projetos Stitch"
        when_to_use: "Quando o produto-final for um walkthrough animado de uma tela ou fluxo de UI"
    artifacts:
      manual: design/motion/MOTION-SYSTEM.md
      examples_dir: design/motion/examples/
    principles:
      - id: BRAND_COMPLIANCE_FIRST
        rule: "Toda animação respeita design_system e rebranding_rules. Cores, tipografia, nomenclatura idênticas às peças estáticas."
      - id: PURPOSE_DRIVEN
        rule: "Animação tem função (atenção, hierarquia, narrativa). Decoração pura é proibida."
      - id: TIMING_OFFICIAL
        rule: "Durações padrão: ENTRADA 400ms a 600ms, ÊNFASE 200ms a 300ms, SAÍDA 200ms a 400ms. Ease-out para entrada, ease-in para saída, ease-in-out para transições."
      - id: REDUCED_MOTION
        rule: "Respeitar prefers-reduced-motion. Toda peça digital fornece versão estática equivalente."
      - id: PERFORMANCE_BUDGET
        rule: "Mobile first. 60fps obrigatório. Vídeos exportados em H.264 para web, max 5MB por trecho de até 6 segundos."
    use_cases:
      lp_hero: "Animação de entrada do logo + headline"
      stat_counter: "Contagem animada de números impactantes (100x, 800k, 82%)"
      step_reveal: "Progressão das 8 Travas como timeline animada"
      audiogram: "Trecho de podcast do Cientista de Marketing com waveform e legenda"
      product_walkthrough: "Demonstração do produto DR-X em vídeo de até 60 segundos"
      design_system_intro: "Animação de abertura do preview.html mostrando paleta, logo e gradient hero"

# ============================================================================
# QUALITY GATES CANÔNICOS (pattern F4, formato estruturado)
# ============================================================================

quality_gates:
  - id: QG-001
    name: "Validação de Entrada"
    description: "Dados mínimos do negócio coletados (faturamento, funil por etapa, canais ativos) + ICP identificado + baseline de métricas registrado"
    blocking: false
    applies_to_phase: "diagnostico"

  - id: QG-002
    name: "Diagnóstico Validado"
    description: "Trava confirmada pelo teste 2 de 3 + constraint TOC validado pelo Master Advisor + qualificação SPICED completa + CRT construída quando aplicável"
    blocking: true
    applies_to_phase: "estrategia"

  - id: QG-003
    name: "Completude de Execução"
    description: "Plano STEP com owners definidos + tasks do ciclo executadas + compliance visual aprovado pelo brand_chief + automações validadas antes de produção"
    blocking: true
    applies_to_phase: "execucao"

  - id: QG-004
    name: "Qualidade de Saída"
    description: "ROI medido contra baseline + tom de voz canônico verificado + ortografia completa e zero travessão + relatório entregue no template oficial"
    blocking: false
    applies_to_phase: "monitoramento"

business_rules:
  - id: BR-001
    name: "Regra de ouro da matemática"
    applies_to: QG-004
    blocking: false
    source: data/fabrica-de-receita-kb.md
    rules:
      - "LTV dividido por CAC maior ou igual a 3:1 (excelência: 5:1)"
      - "Payback de CAC dentro do ciclo de caixa do cliente"

  - id: BR-002
    name: "1 trava por ciclo"
    applies_to: QG-002
    blocking: true
    source: data/8-travas.md
    rules:
      - "Cada ciclo de 90 dias ataca exatamente 1 trava (foco total)"
      - "Trocar de trava no meio do ciclo exige aprovação do Chief"

  - id: BR-003
    name: "Diagnóstico 2 de 3"
    applies_to: QG-002
    blocking: true
    source: data/8-travas.md
    rules:
      - "Trava só é confirmada quando pelo menos 2 dos 3 métodos de diagnóstico convergem"
      - "Divergência total reabre a coleta de dados (QG-001)"

  - id: BR-004
    name: "Idioma e voz"
    applies_to: QG-004
    blocking: true
    source: data/revenue-principles.md
    rules:
      - "Acentuação completa do português em todo output"
      - "Zero travessão em qualquer texto renderizável"
      - "Tom de voz do manual canônico em todos os agentes"

  - id: BR-005
    name: "Brand compliance"
    applies_to: QG-003
    blocking: true
    source: design/tokens/tokens.json
    rules:
      - "Zero azul em qualquer peça"
      - "Logo oficial intacto, nunca recriado"
      - "Contraste WCAG AA validado antes de publicar"

  - id: BR-006
    name: "Zero preço de produto no repositório"
    applies_to: QG-004
    blocking: true
    rules:
      - "Nenhum valor monetário de produto ou serviço em arquivo do squad"
      - "Investimento é sempre tratado como sob consulta comercial"

  - id: BR-007
    name: "Benchmarks de funil como referência"
    applies_to: QG-001
    blocking: false
    source: data/fabrica-de-receita-kb.md
    rules:
      - "Todo diagnóstico compara métricas atuais com os benchmarks canônicos da KB"
      - "Gap sem benchmark documentado vira pedido de dado, não suposição"

