# ============================================================================
# FLUXOS ESTRATÉGICOS (organização hierárquica dos 22 agentes)
# ============================================================================

strategic_flows:

  - id: STRATEGIC_COUNSEL
    tier: 0
    name: Conselho Estratégico
    description: |
      Camada-mestre de pensamento estratégico. Goldratt aconselha o Chief em
      decisões de Throughput, identificação do Constraint real (TOC) e
      Effect-Cause-Effect logic. Cientista de Marketing decide com base em Vantagem Competitiva,
      LTV/CAC, Flywheel e Pirâmide de Decisão.
    role: "Decisão de alto nível e direção estratégica"
    agents:
      - goldratt # Master Advisor (TOC, Throughput, Constraint)
      - cientista-de-marketing # Chief (Cientista do Marketing )

  - id: BRAND_AND_DESIGN
    tier: 0
    name: Brand e Design (autoridade visual)
    description: |
      Autoridade visual do squad. Experience Designer governa identidade, brandbook
      compliance, tipografia, acessibilidade WCAG AA, hierarquia visual e a
      proibição absoluta de azul. Atua como gate de qualidade criativa antes
      de qualquer peça sair do squad. Trabalha com base em design/DESIGN.md,
      design/tokens/tokens.json e design/preview.html.
    role: "Gate de qualidade criativa e governança visual"
    agents:
      - experience-designer # Brand Chief (Human Experience Designer)

  - id: ORCHESTRATION
    tier: 1
    name: Orquestração Operacional
    description: |
      Camada de roteamento e coordenação. Recebe direção do Chief, traduz em
      execução pelos specialists. fabrica-de-receita-master é o sub-orquestrador
      principal; orchestrator faz routing fino; dr-chief coordena específico
      dos produtos Destrava Receita.
    role: "Tradução estratégia → execução"
    agents:
      - fabrica-de-receita-master # Sub-orchestrator principal
      - orchestrator # Routing entre specialists
      - dr-chief # Chief produto Destrava

  - id: DIAGNOSTICO
    tier: 2
    name: Diagnóstico Científico
    description: |
      "Sem dados não há diagnóstico" (Trava 1: Cegueira). Identifica a trava
      real do negócio antes de qualquer ação. Aplica framework SPICED para
      qualificação e o método das 8 Travas para mapeamento.
    travas_v4: ["Cegueira (T1)"]
    role: "Identificar gargalo real (constraint)"
    agents:
      - diagnosticador # Diagnóstico das 8 Travas
      - especialista-spiced # Framework SPICED (Situation/Pain/Impact/Critical Event/Decision)
      - estrategista-receita # Mapeamento estratégico de receita

  - id: AQUISICAO
    tier: 3
    name: Aquisição (Pilar . Tráfego)
    description: |
      Atrair o público certo com o menor CAC possível.
      Cobre as Travas 7 (Atenção) e 8 (Exposição). Caminho: exposição, atenção, lead.
      "V2: Vender para MAIS PESSOAS" do método .
    pilar_v4: Tráfego
    travas_v4: ["Exposição (T8)", "Atenção (T7)", "Interesse (T6)"]
    role: "Encher o topo do funil com qualidade"
    agents:
      - traffic-hunter # Performance / mídia paga
      - fabricante-aquisicao # Sistema de aquisição
      - growth-strategist # Estratégia macro de growth

  - id: ENGAJAMENTO_CONVERSAO
    tier: 3
    name: Engajamento & Conversão (Pilares 2+3)
    description: |
      Criar conexão/confiança e transformar atenção em receita.
      Cobre as Travas 5 (Qualificação), 4 (Compromisso) e 3 (Decisão).
      "V3: Vender MAIS VEZES" via melhor conversão.
    pilar_v4: ["Engajamento", "Conversão"]
    travas_v4: ["Qualificação (T5)", "Compromisso (T4)", "Decisão (T3)"]
    role: "Transformar tráfego em receita"
    agents:
      - conversion-optimizer # CRO técnico (funil/landings/checkouts)
      - maquina-comercial # Comercial estruturado (SDR/Closer)

  - id: RETENCAO
    tier: 3
    name: Retenção e LTV (Pilar . Retenção)
    description: |
      Maximizar LTV e transformar clientes em promotores.
      Cobre a Trava 2 (Retenção). Vender pelo maior valor.
      Onde mora o lucro real. NRR maior que 100% é a meta.
    pilar_v4: Retenção
    travas_v4: ["Retenção (T2)"]
    role: "Maximizar LTV, prevenir churn"
    agents:
      - retention-architect # Arquitetura de retenção/LTV
      - guardiao-retencao # Guardião do CS/churn

  - id: INTELIGENCIA_PERFORMANCE
    tier: 4
    name: Inteligência & Performance
    description: |
      Camada de mensuração, ROI e desenho de flywheel. "A matemática não mente":
      LTV/CAC, NRR, Throughput, unit economics. Desenha o sistema de receita
      e o time que opera o flywheel.
    role: "Medir, otimizar, desenhar o sistema"
    agents:
      - roi-analyst # Análise de ROI / unit economics
      - growth-planner # Planejamento de growth
      - revenue-team-architect # Arquitetura do time de receita

  - id: PRODUTO_DESTRAVA
    tier: 5
    name: Produtos Destrava Receita & Execução
    description: |
      Operacionalização dos produtos Destrava Receita (DR-X, DR-O, DR-T, DR-E)
      e da execução com IA. Geração de artefatos, conteúdo e ops dos contratos
      de consultoria.
    produtos_dr:
      - "DR-X, Destrava Raio-X: diagnóstico de 45 dias, elimina a Cegueira (T1). Tier de entrada"
      - "DR-O, Destrava Operacional: recorrência anual, 1 trava por ciclo de 90 dias, Community Manager. Tier operacional"
      - "DR-T, Destrava Tático: tudo do DR-O com Growth Planner dedicado e SLA de 24h. Tier tático"
      - "DR-E, Destrava Estratégico: tudo do DR-T com acesso C-Level e SLA de 12h. Tier estratégico"
      - "Investimento: sob consulta comercial (valores não fazem parte deste repositório)"
    role: "Entregar o produto, com IA no centro"
    agents:
      - destrava-receita-consultant # Consultoria DR
      - ai-marketing-engineer # IA aplicada a marketing
      - content-engine # Engine de conteúdo
      - ops-dr # Operações Destrava

