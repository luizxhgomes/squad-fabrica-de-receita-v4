<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0203"/>
      <stop offset="0.55" stop-color="#050505"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.12" r="0.75">
      <stop offset="0" stop-color="#E50914" stop-opacity="0.42"/>
      <stop offset="0.45" stop-color="#7A0A02" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E50914"/>
      <stop offset="1" stop-color="#FB2E0A"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- filete de marca -->
  <rect x="80" y="118" width="120" height="8" rx="4" fill="url(#rule)"/>

  <!-- eyebrow -->
  <text x="80" y="104" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="6" fill="#B8B8B8">SQUAD DE ORQUESTRAÇÃO DE AGENTES DE IA · CLAUDE CODE</text>

  <!-- titulo -->
  <text x="76" y="248" font-family="Impact, Haettenschweiler, Helvetica Neue, sans-serif" font-size="150" font-weight="900" letter-spacing="1" fill="#FFFFFF">FÁBRICA DE</text>
  <text x="76" y="384" font-family="Impact, Haettenschweiler, Helvetica Neue, sans-serif" font-size="150" font-weight="900" letter-spacing="1" fill="#E50914">RECEITA <tspan fill="#FFFFFF">V4</tspan></text>

  <!-- tagline -->
  <text x="80" y="452" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#D6D6D6">Estratégia de receita com Teoria das Restrições, hierarquia chief-first.</text>

  <!-- stats -->
  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
    <text x="80"  y="556" font-size="58" font-weight="800" fill="#FFFFFF">27</text>
    <text x="80"  y="592" font-size="24" font-weight="500" fill="#9A9A9A">agentes</text>
    <text x="300" y="556" font-size="58" font-weight="800" fill="#FFFFFF">22</text>
    <text x="300" y="592" font-size="24" font-weight="500" fill="#9A9A9A">tasks</text>
    <text x="510" y="556" font-size="58" font-weight="800" fill="#FFFFFF">10</text>
    <text x="510" y="592" font-size="24" font-weight="500" fill="#9A9A9A">workflows</text>
    <text x="760" y="556" font-size="58" font-weight="800" fill="#FFFFFF">10</text>
    <text x="760" y="592" font-size="24" font-weight="500" fill="#9A9A9A">skills</text>
  </g>

  <!-- handle -->
  <text x="1200" y="556" text-anchor="end" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="27" font-weight="700" letter-spacing="1" fill="#00A86B">github.com/luizxhgomes</text>

  <rect x="0" y="632" width="1280" height="8" fill="url(#rule)"/>
</svg>
